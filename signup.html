<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL-7 // Registrasi Operator Baru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ocean-bg">
    <div class="caustics"></div>
    <div class="ray ray1"></div>
    <div class="ray ray2"></div>
    <div class="ray ray3"></div>
    <div class="ray ray4"></div>
    <div class="seaweed" style="left:4%;"></div>
    <div class="seaweed" style="left:12%; height:18vh; animation-delay:1.2s;"></div>
    <div class="seaweed" style="right:6%; height:22vh; animation-delay:.5s;"></div>
    <div id="bubbleField"></div>
  </div>

  <div class="sonar"></div>
  <div class="sonar s2"></div>
  <div class="sonar s3"></div>

  <!-- REGISTRATION PANEL -->
  <main class="panel">
    <div class="eyebrow"><span class="dot"></span> UNIT PATROLI BARU <span class="dot"></span></div>
    <h1 class="title title-flicker">DAFTAR</h1>
    <p class="subtitle">Registrasi Operator <span class="live">// SENTINEL-7</span></p>

    <form id="signupForm">
      <div class="field">
        <label for="newUser">ID Operator</label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
        <input id="newUser" type="text" placeholder="buat ID operator" autocomplete="username">
      </div>
      <div class="field">
        <label for="newPass">Kata Sandi</label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="newPass" type="password" placeholder="••••••••" autocomplete="new-password">
        <button type="button" class="toggle-vis" id="toggleVisNew" aria-label="Tampilkan sandi">
          <svg id="eyeOpenIconNew" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeClosedIconNew" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M3 3l18 18"/><path d="M10.6 10.6a2 2 0 0 0 2.83 2.83"/><path d="M9.5 5.3A10.9 10.9 0 0 1 12 5c7 0 11 7 11 7a17.6 17.6 0 0 1-3.1 3.9M6.5 6.6C3.7 8.3 1 12 1 12s4 7 11 7c1.3 0 2.5-.2 3.6-.6"/></svg>
        </button>
        <div class="strength" id="strengthMeter"><i></i><i></i><i></i></div>
      </div>
      <div class="field">
        <label for="confirmPass">Konfirmasi Kata Sandi</label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="confirmPass" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>

      <p id="signupAlert" class="alert"></p>

      <button class="dive" type="submit">Aktifkan Unit</button>

      <p class="switch-auth">Sudah punya akses? <a href="index.html">Masuk ke terminal</a></p>
    </form>
  </main>

<script src="auth.js"></script>
<script src="signup.js"></script>
</body>
</html>
